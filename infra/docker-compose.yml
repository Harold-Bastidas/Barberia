services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL 16
  # Exposes: ${POSTGRES_PORT} → 5432 (internal)
  # Init scripts in ./postgres/ run once on first start (empty volume).
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: barber_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/00_create_databases.sh:/docker-entrypoint-initdb.d/00_create_databases.sh
      - ./postgres/01_extensions.sql:/docker-entrypoint-initdb.d/01_extensions.sql
    networks:
      - barber_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────────
  # n8n — Workflow automation (WhatsApp notifications, async flows)
  # Exposes: ${N8N_PORT} → 5678 (internal)
  # Uses postgres as its backing DB (separate "n8n" database).
  # ──────────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: barber_n8n
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      # Timezone for cron triggers and displayed dates
      GENERIC_TIMEZONE: America/Bogota
      TZ: America/Bogota
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - barber_net
    depends_on:
      postgres:
        condition: service_healthy

  # ──────────────────────────────────────────────────────────────────────────
  # Evolution API — WhatsApp gateway (Baileys-based, unofficial)
  # Exposes: ${EVOLUTION_PORT} → 8080 (internal)
  # WARNING: session files in the volume contain WhatsApp credentials.
  # Never commit or expose the evolution_data volume.
  # Image tag: check https://hub.docker.com/r/atendai/evolution-api for latest.
  # ──────────────────────────────────────────────────────────────────────────
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: barber_evolution
    restart: unless-stopped
    environment:
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - barber_net

  # ──────────────────────────────────────────────────────────────────────────
  # Adminer — Visual database inspector (development only)
  # Exposes: ${ADMINER_PORT} → 8080 (internal)
  # Access at http://localhost:${ADMINER_PORT}
  # Connect: System=PostgreSQL, Server=postgres, User/Pass from .env
  # ──────────────────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: barber_adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    networks:
      - barber_net
    depends_on:
      - postgres

networks:
  barber_net:
    driver: bridge

volumes:
  postgres_data:
  n8n_data:
  evolution_data:
